# =============================================================================
# fsbackup targets
# =============================================================================

class1:
  # =============
  # fs
  # =============

  - id: technicom.files
    host: fs
    source: /share/technicom

  - id: shared.files
    host: fs
    source: /share/shared

  - id: paperlessngx.data
    host: fs
    source: /docker/volumes/paperlessngx_data
    type: dir
    rsync_opts:
      "--exclude=_data/db --exclude=_data/redisdata/dump.rdb
      --exclude=_data/ssh_host_keys/ssh_host_ed25519_key
      --exclude=_data/ssh_host_keys/ssh_host_rsa_key"

  - id: apache.git.repos
    host: fs
    source: /var/www/src
    type: dir

  - id: paperlessngx.db
    host: fs
    source: /backup/exports/paperlessngx
    type: dir

  - id: homeassistant.db
    host: fs
    source: /backup/exports/homeassistant
    type: dir

  # =============
  # denhpsvr1
  # =============

  - id: mosquitto.data
    host: denhpsvr1
    source: /docker/volumes/mosquitto_data

  - id: ntfy.data
    host: denhpsvr1
    source: /docker/volumes/ntfy_data

  - id: prometheus.data
    host: denhpsvr1
    source: /docker/volumes/prometheus_data/_data/prometheus_data/snapshots/current_snapshot
    type: dir
  
  - id: victoriametrics.data
    host: denhpsvr1
    source: /docker/volumes/prometheus_data/_data/victoriametrics_data/snapshots/current_snapshot
    type: dir

  - id: registry.data
    host: denhpsvr1
    source: /docker/volumes/registry_data

  - id: zabbix.server.data
    host: denhpsvr1
    source: /docker/volumes/zabbix_server_data
    type: dir
    rsync_opts: "--exclude=_data/zabbix_db"

  - id: zabbix.server.db
    host: denhpsvr1
    source: /exports/zabbix
    type: dir

  # =============
  # denhpsvr2
  # =============

  - id: grafana.data
    host: denhpsvr2
    source: /docker/volumes/grafana_data

  - id: ipam.data
    host: denhpsvr2
    source: /docker/volumes/ipam_data

  - id: ipam.db
    host: denhpsvr2
    source: /exports/phpipam

  - id: lube-logger.data
    host: denhpsvr2
    source: /docker/volumes/lube-logger_data

  - id: mealie.data
    host: denhpsvr2
    source: /docker/volumes/mealie_data

  - id: owntracks.data
    host: denhpsvr2
    source: /docker/volumes/owntracks_data

  # =============
  # hs
  # =============

  - id: headscale.data
    host: hs
    source: /var/lib/headscale
    type: dir
    rsync_opts: "--no-owner --no-group --no-perms --omit-dir-times"

  # =============
  # ns1
  # =============

  - id: ns1.bind.zones
    host: ns1
    source: /etc/bind/zones

  - id: ns1.bind.keys
    host: ns1
    source: /etc/bind/keys

  - id: ns1.bind.cache
    host: ns1
    source: /var/cache/bind

  # =============
  # ns2
  # =============

  - id: ns2.bind.keys
    host: ns2
    source: /etc/bind/keys

  - id: ns2.bind.cache
    host: ns2
    source: /var/cache/bind

  # =============
  # rp
  # =============

  - id: nginx.letsencrypt
    host: rp
    source: /etc/letsencrypt
    type: dir
    rsync_opts:
      "--exclude=archive/ --exclude=live/*/privkey.pem --exclude=keys/"

class2:
  # =================
  # fs
  # =================

  - id: apache.config
    host: fs
    source: /etc/apache2
    type: dir

  - id: homeassistant.backups
    host: fs
    source: /backup/exports/homeassistant

  - id: docker.stacks.fs
    host: fs
    source: /docker/stacks
    type: dir
    rsync_opts: "--no-perms --no-owner --no-group --exclude=portainer/data"

  # =================
  # hs
  # =================

  - id: headscale.config
    host: hs
    source: /etc/headscale
    type: dir
    rsync_opts: "--no-owner --no-group --no-perms --omit-dir-times"

  # =================
  # ns1
  # =================

  - id: ns1.bind.named.conf
    host: ns1
    source: /etc/bind
    type: dir
    rsync_opts: "--exclude=rndc.conf"

  - id: ns1.webmin.config
    host: ns1
    source: /etc/webmin
    type: dir
    rsync_opts: "--no-owner --no-group --no-perms --omit-dir-times"

  # =================
  # ns2
  # =================

  - id: ns2.bind.named.conf
    host: ns2
    source: /etc/bind
    type: dir
    rsync_opts: "--exclude=rndc.conf"

  - id: ns2.webmin.config
    host: ns2
    source: /etc/webmin
    type: dir
    rsync_opts: "--no-owner --no-group --no-perms --omit-dir-times"

  # =============
  # rp
  # =============

  - id: rp.nginx.config
    host: rp
    source: /etc/nginx

  # =============
  # denhpsvr1
  # =============

  - id: docker.stacks.denhpsvr1
    host: denhpsvr1
    source: /docker/stacks

  - id: nginx.data
    host: denhpsvr1
    source: /docker/volumes/nginx_data
    type: dir
    rsync_opts: "--exclude=_data/nginx/modules --exclude=_data/certbot"

  # =============
  # denhpsvr2
  # =============

  - id: docker.stacks.denhpsvr2
    host: denhpsvr2
    source: /docker/stacks

  # =============
  # weewx
  # =============

  - id: weewx.html
    host: weewx
    source: /var/www/html

  - id: weewx.config
    host: weewx
    source: /etc/weewx

  # =============
  # mdns
  # =============

  - id: mdns.avahi
    host: mdns
    source: /etc/avahi
    type: dir
    rsync_opts: "--no-owner --no-group --no-perms --omit-dir-times"

class3:
  # =============================================================
  # class3: large archive targets — monthly snapshots only
  # no mirror to /backup2 (see MIRROR_SKIP_CLASSES in fsbackup.conf)
  # offsite: M-DISC annually, USB external monthly (manual)
  # =============================================================

  # =============
  # pictures (/share/pictures — fs local)
  # =============

  - id: pictures.digital_cameras
    host: fs
    source: /share/pictures/digital_cameras
    type: dir

  - id: pictures.digital_cameras_raw
    host: fs
    source: /share/pictures/digital_cameras_raw
    type: dir

  - id: pictures.mobile_photos
    host: fs
    source: /share/pictures/mobile_photos
    type: dir


