# =============================================================================
# fsbackup targets
# =============================================================================

class1:

  # =============
  # fs
  # =============

  - id: technicom.files
    host: fs
    source: /shr/technicom

  - id: shared.files
    host: fs
    source: /shr/shared

  - id: paperlessngx.data
    host: fs
    source: /docker/volumes/paperlessngx_data
    type: dir
    rsync_opts: "--exclude=_data/db --exclude=_data/redisdata/dump.rdb"

  - id: paperlessngx.consume
    host: fs
    source: /consume

  - id: apache.git.repos
    host: fs
    source: /var/www/src
    type: dir

      #- id: plex.config
      #host: fs
      #source: /var/lib/plexmediaserver/Library/Application Support/Plex Media Server
      #type: dir
      #rsync_opts: "--exclude=.LocalAdminToken"

  # =============
  # denhpsvr1
  # =============

  - id: mosquitto.data
    host: denhpsvr1
    source: /docker/volumes/mosquitto_data

  - id: ntfy.data
    host: denhpsvr1
    source: /docker/volumes/ntfy_data

  - id: prometheus.data
    host: denhpsvr1
    source: /docker/volumes/prometheus_data
    type: dir
    rsync_opts: "--exclude=_data/victoriametrics_data/cache/**"

  - id: registry.data
    host: denhpsvr1
    source: /docker/volumes/registry_data

  - id: zabbix.server.data
    host: denhpsvr1
    source: /docker/volumes/zabbix_server_data
    type: dir
    rsync_opts: "--exclude=_data/zabbix_db"

  - id: zabbix.server.db
    host: denhpsvr1
    source: /exports/zabbix
    type: dir

  # =============
  # denhpsvr2
  # =============

  - id: grafana.data
    host: denhpsvr2
    source: /docker/volumes/grafana_data

  - id: ipam.data
    host: denhpsvr2
    source: /docker/volumes/ipam_data

  - id: lube-logger.data
    host: denhpsvr2
    source: /docker/volumes/lube-logger_data

  - id: mealie.data
    host: denhpsvr2
    source: /docker/volumes/mealie_data

  - id: owntracks.data
    host: denhpsvr2
    source: /docker/volumes/owntracks_data

  # =============
  # hs
  # =============

  - id: headscale.data
    host: hs
    source: /var/lib/headscale
    type: dir
    rsync_opts: "--no-owner --no-group --no-perms --omit-dir-times"

  # =============
  # ns1
  # =============

  - id: ns1.bind.zones
    host: ns1
    source: /etc/bind/zones

  - id: ns1.bind.keys
    host: ns1
    source: /etc/bind/keys

  - id: ns1.bind.cache
    host: ns1
    source: /var/cache/bind

  # =============
  # ns2
  # =============

  - id: ns2.bind.keys
    host: ns2
    source: /etc/bind/keys

  - id: ns2.bind.cache
    host: ns2
    source: /var/cache/bind

  # =============
  # rp
  # =============

  - id: nginx.letsencrypt
    host: rp
    source: /etc/letsencrypt
    type: dir
    rsync_opts: "--exclude=archive/ --exclude=live/*/privkey.pem --exclude=keys/"

class2:

  # =================
  # fs
  # =================

  - id: apache.config
    host: fs
    source: /etc/apache2
    type: dir

  - id: homeassistant.backups
    host: fs
    source: /shr/backups/homeassistant

  - id: docker.stacks.fs
    host: fs
    source: /docker/stacks
    type: dir
    rsync_opts: "--no-perms --no-owner --no-group --exclude=portainer/data"

  # =================
  # hs
  # =================

  - id: headscale.config
    host: hs
    source: /etc/headscale
    type: dir
    rsync_opts: "--no-owner --no-group --no-perms --omit-dir-times"

  # =================
  # ns1
  # =================

  - id: ns1.bind.named.conf
    host: ns1
    source: /etc/bind
    type: dir
    rsync_opts: "--exclude=rndc.conf"

  - id: ns1.webmin.config
    host: ns1
    source: /etc/webmin
    type: dir
    rsync_opts: "--no-owner --no-group --no-perms --omit-dir-times"

  - id: ns1.webmin.state
    host: ns1
    source: /var/webmin
    type: dir
    rsync_opts: "--no-owner --no-group --no-perms --omit-dir-times --exclude=webmin.log --exclude=modules/authentic-theme/"

  # =================
  # ns2
  # =================

  - id: ns2.bind.named.conf
    host: ns2
    source: /etc/bind
    type: dir
    rsync_opts: "--exclude=rndc.conf"

  - id: ns2.webmin.config
    host: ns2
    source: /etc/webmin
    type: dir
    rsync_opts: "--no-owner --no-group --no-perms --omit-dir-times"

  - id: ns2.webmin.state
    host: ns2
    source: /var/webmin
    type: dir
    rsync_opts: "--no-owner --no-group --no-perms --omit-dir-times --exclude=webmin.log --exclude=modules/authentic-theme/"

  # =============
  # rp
  # =============

  - id: rp.nginx.config
    host: rp
    source: /etc/nginx

  # =============
  # denhpsvr1
  # =============

  - id: docker.stacks.denhpsvr1
    host: denhpsvr1
    source: /docker/stacks

  - id: nginx.data
    host: denhpsvr1
    source: /docker/volumes/nginx_data
    type: dir
    rsync_opts: "--exclude=_data/nginx/modules"
      
  # =============
  # denhpsvr2
  # =============

  - id: docker.stacks.denhpsvr2
    host: denhpsvr2
    source: /docker/stacks

  # =============
  # weewx
  # =============

  - id: weewx.html
    host: weewx
    source: /var/www/html

  - id: weewx.config
    host: weewx
    source: /etc/weewx

  # =============
  # mdns
  # =============

  - id: mdns.avahi
    host: mdns
    source: /etc/avahi
    type: dir
    rsync_opts: "--no-owner --no-group --no-perms --omit-dir-times"

class3:
  - id: system.hostname
    host: all
    source: /etc/hostname

  - id: system.hosts
    host: all
    source: /etc/hosts

  - id: system.netplan.fs
    host: fs
    source: /etc/netplan
    type: dir

  - id: system.netplan.denhpsvr1
    host: denhpsvr1
    source: /etc/netplan

  - id: system.netplan.denhpsvr2
    host: denhpsvr2
    source: /etc/netplan

