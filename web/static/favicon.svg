  @media (prefers-color-scheme: dark)  { :root { color: #f4f4f5; } }
</style>

<!-- Disc outline -->
<circle cx="130" cy="128" r="92" fill="none" stroke="currentColor" stroke-width="6"/>

<!-- Hub: ring + center dot -->
